name: Software citation

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    branches: [main]
    types:
      - completed

permissions:
  contents: write

jobs:
  update:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          contains(github.event.workflow_run.head_commit.message, '[release]')
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}

      - name: Sync software citation metadata
        id: citation
        uses: arcangelo7/software-citation-sync@0b18b7e155e903db9661bb14d60e6f8a40e8c8cf # v2.0.1

      - name: Commit citation updates
        if: steps.citation.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff README.md
          git commit -m "docs: update software citation metadata"
          git push
